<!DOCTYPE html>
<html>
<head>
  <title>My Cool Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
      color: white;
      text-align: center;
    }
    .container {
      margin-top: 100px;
    }
    h1 {
      font-size: 50px;
    }
    p {
      font-size: 20px;
      opacity: 0.8;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #ff006e;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      transition: 0.3s;
    }
    .btn:hover {
      background: #ff4da6;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hey, I'm Ani 🚀</h1>
    <p>This is my cool website</p>
    <a href="#" class="btn">Follow Me</a>
  </div>
</body>
</html>
